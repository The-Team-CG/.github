# CodeQL analysis — soft when Advanced Security is unavailable.
name: Reusable CodeQL

on:
  workflow_call:
    inputs:
      languages:
        description: Comma-separated CodeQL languages
        type: string
        required: false
        default: "javascript-typescript"

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        id: init
        continue-on-error: true
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ inputs.languages }}

      - name: Autobuild
        if: steps.init.outcome == 'success'
        continue-on-error: true
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        id: analyze
        if: steps.init.outcome == 'success'
        continue-on-error: true
        uses: github/codeql-action/analyze@v3

      - name: Soft result
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.init.outcome }}" != "success" ] || [ "${{ steps.analyze.outcome }}" = "failure" ]; then
            echo "::warning::CodeQL skipped or incomplete (often needs Advanced Security on private repos). Pipeline continues."
          else
            echo "CodeQL completed."
          fi
