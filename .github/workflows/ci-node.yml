# Reusable Node.js CI for The-Team-CG product repos.
# Call from product repos:
#   uses: The-Team-CG/.github/.github/workflows/ci-node.yml@main
name: Reusable Node CI

on:
  workflow_call:
    inputs:
      working_directory:
        description: App root relative to repo root
        type: string
        required: false
        default: "."
      node_version:
        description: Node.js version
        type: string
        required: false
        default: "24"
      package_manager:
        description: npm | pnpm | yarn
        type: string
        required: false
        default: "npm"
      install_command:
        description: Override install command (empty = auto from package_manager)
        type: string
        required: false
        default: ""
      lint_command:
        description: Lint command; empty skips
        type: string
        required: false
        default: ""
      typecheck_command:
        description: Typecheck command; empty skips
        type: string
        required: false
        default: ""
      test_command:
        description: Test command (include coverage when ready, e.g. npm test -- --coverage); empty skips
        type: string
        required: false
        default: ""
      audit_command:
        description: Dependency audit; default npm audit --audit-level=high; set empty to skip
        type: string
        required: false
        default: "npm audit --audit-level=high"
      build_command:
        description: Build command; empty skips
        type: string
        required: false
        default: "npm run build"
      run_install:
        description: Whether to install dependencies
        type: boolean
        required: false
        default: true

jobs:
  node-ci:
    name: Node CI (${{ inputs.working_directory }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          check-latest: true

      - name: Enable corepack (pnpm/yarn)
        if: inputs.package_manager == 'pnpm' || inputs.package_manager == 'yarn'
        run: corepack enable

      - name: Install dependencies
        if: inputs.run_install
        env:
          # Safe placeholders so Next/Supabase clients can construct without real secrets
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.install_command }}" ]; then
            eval "${{ inputs.install_command }}"
            exit 0
          fi
          case "${{ inputs.package_manager }}" in
            npm)
              if [ -f package-lock.json ]; then npm ci; else npm install; fi
              ;;
            pnpm)
              if [ -f pnpm-lock.yaml ]; then pnpm install --frozen-lockfile; else pnpm install; fi
              ;;
            yarn)
              if [ -f yarn.lock ]; then yarn install --frozen-lockfile; else yarn install; fi
              ;;
            *)
              echo "Unsupported package_manager: ${{ inputs.package_manager }}"
              exit 1
              ;;
          esac

      - name: Dependency audit
        if: inputs.audit_command != ''
        shell: bash
        run: |
          set +e
          eval "${{ inputs.audit_command }}"
          code=$?
          if [ "$code" -ne 0 ]; then
            # Soft-fail by default: many legacy apps have high findings; still surface in logs.
            # Set audit_command to a wrapper that exits 0, or clean deps then treat as hard gate in product policy.
            echo "::warning::Dependency audit reported issues (exit $code). Fix high/critical CVEs ASAP."
          fi
          exit 0

      - name: Lint
        if: inputs.lint_command != ''
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
        shell: bash
        run: eval "${{ inputs.lint_command }}"

      - name: Typecheck
        if: inputs.typecheck_command != ''
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
        shell: bash
        run: eval "${{ inputs.typecheck_command }}"

      - name: Test (+ coverage when command includes it)
        if: inputs.test_command != ''
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          CI: "true"
        shell: bash
        run: eval "${{ inputs.test_command }}"

      - name: Upload coverage artifact
        if: inputs.test_command != ''
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: coverage-${{ github.run_id }}-${{ github.job }}
          path: |
            ${{ inputs.working_directory }}/coverage/**
            ${{ inputs.working_directory }}/**/coverage/**
            ${{ inputs.working_directory }}/lcov.info
            ${{ inputs.working_directory }}/**/lcov.info
          if-no-files-found: ignore
          retention-days: 7

      - name: Build
        if: inputs.build_command != ''
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          # Common Next.js build placeholders
          NEXT_TELEMETRY_DISABLED: "1"
        shell: bash
        run: eval "${{ inputs.build_command }}"
