# Reusable Vercel deploy for The-Team-CG (free Hobby-friendly).
# Secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# Optional smoke: smoke_url (full URL) or uses deployment URL + smoke_path
name: Reusable Vercel Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: staging | production
        type: string
        required: true
      working_directory:
        type: string
        required: false
        default: "."
      vercel_org_id:
        type: string
        required: false
        default: ""
      vercel_project_id:
        type: string
        required: false
        default: ""
      node_version:
        type: string
        required: false
        default: "22"
      smoke_url:
        description: Full URL to smoke-check (optional; else deployment URL)
        type: string
        required: false
        default: ""
      smoke_path:
        description: Path appended to deployment URL when smoke_url empty
        type: string
        required: false
        default: "/"
      run_smoke:
        description: curl smoke after deploy
        type: boolean
        required: false
        default: true
    outputs:
      deployment_url:
        description: Deployed URL when deploy ran
        value: ${{ jobs.deploy.outputs.deployment_url }}
      skipped:
        description: true if credentials missing
        value: ${{ jobs.deploy.outputs.skipped }}

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      deployment_url: ${{ steps.deploy.outputs.url }}
      skipped: ${{ steps.creds.outputs.skip }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Validate environment name
        shell: bash
        run: |
          set -euo pipefail
          case "${{ inputs.environment }}" in
            staging|production) ;;
            *)
              echo "environment must be staging or production, got: ${{ inputs.environment }}"
              exit 1
              ;;
          esac

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Resolve credentials
        id: creds
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SECRET_ORG: ${{ secrets.VERCEL_ORG_ID }}
          SECRET_PROJECT: ${{ secrets.VERCEL_PROJECT_ID }}
          INPUT_ORG: ${{ inputs.vercel_org_id }}
          INPUT_PROJECT: ${{ inputs.vercel_project_id }}
          TARGET_ENV: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_TOKEN}" ]; then
            echo "VERCEL_TOKEN is not set. Deploy will be skipped."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ORG_ID="${INPUT_ORG:-$SECRET_ORG}"
          PROJECT_ID="${INPUT_PROJECT:-$SECRET_PROJECT}"
          if [ -z "${ORG_ID}" ] || [ -z "${PROJECT_ID}" ]; then
            echo "VERCEL_ORG_ID/VERCEL_PROJECT_ID missing — skip deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "org_id=$ORG_ID" >> "$GITHUB_OUTPUT"
          echo "project_id=$PROJECT_ID" >> "$GITHUB_OUTPUT"
          if [ "$TARGET_ENV" = "production" ]; then
            echo "prod=true" >> "$GITHUB_OUTPUT"
            echo "scope=production" >> "$GITHUB_OUTPUT"
          else
            echo "prod=false" >> "$GITHUB_OUTPUT"
            echo "scope=preview" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Vercel CLI
        if: steps.creds.outputs.skip != 'true'
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        if: steps.creds.outputs.skip != 'true'
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ steps.creds.outputs.org_id }}
          VERCEL_PROJECT_ID: ${{ steps.creds.outputs.project_id }}
        run: vercel pull --yes --environment="${{ steps.creds.outputs.scope }}" --token="$VERCEL_TOKEN"

      - name: Build project artifacts
        if: steps.creds.outputs.skip != 'true'
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ steps.creds.outputs.org_id }}
          VERCEL_PROJECT_ID: ${{ steps.creds.outputs.project_id }}
        run: |
          if [ "${{ steps.creds.outputs.prod }}" = "true" ]; then
            vercel build --prod --token="$VERCEL_TOKEN"
          else
            vercel build --token="$VERCEL_TOKEN"
          fi

      - name: Deploy prebuilt to Vercel
        id: deploy
        if: steps.creds.outputs.skip != 'true'
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ steps.creds.outputs.org_id }}
          VERCEL_PROJECT_ID: ${{ steps.creds.outputs.project_id }}
        run: |
          set -euo pipefail
          if [ "${{ steps.creds.outputs.prod }}" = "true" ]; then
            url=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          else
            url=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          fi
          echo "Deployed: $url"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Smoke check (free curl)
        if: steps.creds.outputs.skip != 'true' && inputs.run_smoke
        shell: bash
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
          SMOKE_URL: ${{ inputs.smoke_url }}
          SMOKE_PATH: ${{ inputs.smoke_path }}
        run: |
          set -euo pipefail
          target="${SMOKE_URL}"
          if [ -z "$target" ]; then
            base="${DEPLOY_URL%/}"
            path="${SMOKE_PATH}"
            case "$path" in
              /*) target="${base}${path}" ;;
              *) target="${base}/${path}" ;;
            esac
          fi
          echo "Smoke GET $target"
          # retry a few times for cold starts
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /tmp/smoke.out -w "%{http_code}" --max-time 30 "$target" || echo "000")
            echo "attempt $i -> HTTP $code"
            if [ "$code" -ge 200 ] && [ "$code" -lt 500 ]; then
              echo "Smoke OK"
              exit 0
            fi
            sleep 5
          done
          echo "Smoke failed for $target"
          exit 1

      - name: Skip notice
        if: steps.creds.outputs.skip == 'true'
        run: |
          echo "::warning::Vercel credentials missing — deploy skipped for environment '${{ inputs.environment }}'."
